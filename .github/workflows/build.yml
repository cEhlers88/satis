name: build-satis

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      COMPOSER_PROCESS_TIMEOUT: 0
      COMPOSER_NO_INTERACTION: 1
      COMPOSER_NO_AUDIT: 1

    steps:
      - uses: actions/checkout@v4

      - name: Restore previous build artifacts
        run: |
          mkdir -p public
          if git fetch origin gh-pages --depth=1; then
            git archive origin/gh-pages | tar -x -C public
            echo "Previous build artifacts restored."
          else
            echo "No previous build artifacts found (gh-pages branch does not exist yet), starting fresh."
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          tools: composer:v2

      - name: Configure auth
        env:
          SATIS_GITHUB_TOKEN: ${{ secrets.SATIS_GITHUB_TOKEN }}
        run: |
          composer config --global --auth github-oauth.github.com "$SATIS_GITHUB_TOKEN"

          git config --global url."https://x-access-token:${SATIS_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global --add url."https://x-access-token:${SATIS_GITHUB_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Get week number for cache key
        id: cache-date
        run: |
          echo "week=$(date +'%G-%V')" >> "$GITHUB_OUTPUT"
          echo "year=$(date +'%G')" >> "$GITHUB_OUTPUT"

      - name: Cache satis installation
        uses: actions/cache@v4
        with:
          path: .tooling/satis
          key: satis-tooling-${{ runner.os }}-${{ steps.cache-date.outputs.week }}
          restore-keys: |
            satis-tooling-${{ runner.os }}-${{ steps.cache-date.outputs.year }}-
            satis-tooling-${{ runner.os }}-

      - name: Install satis
        run: |
          mkdir -p .tooling
          if [ ! -f ".tooling/satis/bin/satis" ]; then
            rm -rf .tooling/satis
            composer create-project --no-interaction --no-progress composer/satis .tooling/satis dev-main
          else
            echo "Satis already installed from cache, skipping."
          fi

      - name: Prune index to newest 5 versions per package
        run: |
          unset GITHUB_TOKEN
          php scripts/prune-old-versions.php satis.json 5
          echo "--- effective satis.json ---"
          cat satis.json

      - name: Build
        run: |
          unset GITHUB_TOKEN
          mkdir -p public
          php .tooling/satis/bin/satis build satis.json public -n

      - name: Remove orphaned include files
        run: php scripts/cleanup-orphaned-includes.php public

      - name: Inspect build output
        run: |
          ls -la public
          find public -maxdepth 2 -type f | head -n 50

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ github.token }}
          publish_dir: public
          publish_branch: gh-pages
          force_orphan: true